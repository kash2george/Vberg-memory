<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill Sentence Splitter</title>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Reggae One', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #f5f4f0;
  padding: 1rem;
}
h1 { font-size: clamp(1.6rem, 5vw, 2.8rem); margin-bottom: .5rem; text-align: center; }
p { font-size: clamp(.9rem, 2.5vw, 1.1rem); color: #555; margin-bottom: 2rem; text-align: center; }
#hero-inp {
  width: min(480px, 100%);
  font-size: 1.1rem;
  font-family: 'Reggae One', system-ui, sans-serif;
  border: 2px solid #ccc;
  border-radius: 10px;
  padding: 10px 16px;
  outline: none;
  transition: border-color .2s;
}
#hero-inp:focus { border-color: #888; }
</style>
</head>
<body>
<h1>Hill Sentence Splitter</h1>
<p>Type a sentence and press Enter to visualise it.</p>
<input id="hero-inp" type="text" placeholder="Type a sentence…" autofocus>
<script>
document.getElementById('hero-inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var text = e.target.value.trim();
    if (text) window.location.href = 'demo.html?text=' + encodeURIComponent(text);
  }
});
</script>
</body>
</html>
